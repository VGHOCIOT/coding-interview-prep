<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="toolbar">
    <span class="logo">Interview Prep</span>
    <select id="problem-select" class="select"></select>
    <div class="toolbar-right">
      <select id="lang-select" class="select">
        <option value="python">Python</option>
        <option value="typescript">TypeScript</option>
        <option value="javascript">JavaScript</option>
      </select>
      <button id="run-btn">&#9654; Run</button>
      <span id="run-status"></span>
    </div>
  </header>

  <main id="layout">
    <section id="left-panel">
      <div id="problem-meta">
        <div id="problem-badges">
          <span id="problem-difficulty" class="badge"></span>
          <span id="problem-type" class="badge"></span>
        </div>
        <h2 id="problem-title"></h2>
      </div>
      <div id="problem-description"></div>
    </section>

    <div class="split-divider"></div>

    <section id="right-panel">
      <div id="editor-container"></div>
      <div class="results-divider"></div>
      <div id="results-panel">
        <div id="results-placeholder" class="placeholder">Click Run to test your solution</div>
        <div id="results-list"></div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script>var require = { paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } };</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
